- title: Tickets
  items:
    - title: Welche Tickets gibt es?
      body: |
        Es gibt das Wochenend-Ticket und die Tagestickets. Zelten ist im Wochenend-Ticket integriert.
        Wir werden die Tickets in drei Phasen verö entlichen. Seid also schnell und holt euch unser
        Wochenend-Ticket bevor sie weg sind :)
    - title: Ab wann gibt es Tagestickets?
      body: |
        Die Tagestickets werden ab Phase drei verfügbar sein.
    - title: Ab wie viel Jahren ist das Festival?
      body: |
        Unser Festival ist ab 18 Jahren. Sonntags können an unserem Familientag Minderjährige in
        Begleitung eines Erwachsenen auf das Gelände. Sie bekommen ein extra Bändchen.
    - title: Wo bekomme ich mein Bändchen?
      body: |
        Das erworbene und gültige Ticket wird am Eingang des Festivalgeländes gegen das Bändchen
        eingelöst. Auf dem Gelände werden Kontrollen durchgeführt – Wer kein Bändchen vorzeigen
        kann, muss das Gelände verlassen. Bitte respektiert, dass ohne Ticket das Gelände nicht betreten
        werden darf.
- title: Anreise
  items:
    - title: Wo findet das Festival statt?
      body: |
        Das Festival ndet in Saurach Statt. Zwischen Illshofen und Crailsheim. Hier findet ihr das Silvatica
        Festival bei <a href="https://maps.app.goo.gl/QtMh6e85nmLSo6Dk6">Google Maps</a>.
    - title: Wie komme ich zum Gelände?
      body: |
        Falls ihr mit dem Auto kommt, fahrt bitte über Saurach, Fundis-Gasthaus Rößle. Die einfahrt zum
        Gelände wird ausgeschildert sein.
    - title: Wann kann ich an- und abreisen?
      body: |
        Das Festival beginnt am Freitag um 18 Uhr. Anreisen könnt ihr schon ab Freitag Morgen. Der
        Campingplatz ist bereit, sodass ihr euer Lager aufschlagen könnt.
    - title: Wo kann ich parken?
      body: |
        Wir haben einen großen Parkplatz, gleich neben dem Campingplatz und dem Festivalgelände.
    - title: Kann ich mit Bus oder Bahn anreisen?
      body: |
        Bahnhof: Eckartshausen-Ilshofen

        Die nahe liegenden Bushaltestellen sind:

          - Saurach Ort

          - Saurach Abzw.

          - Oberschmerach Ort

          - Unterschmerach Abzw.
- title: Camping
  items:
    - title: Kann ich vor Ort campen?
      body: |
        Ja. Wir haben eine große Zeltwiese, direkt neben unserem Festivalgelände. Unser Zelt-Ticket ist im
        Wochenend-Ticket inklusive.
    - title: Kann ich mit dem Camper auf den Campingplatz?
      body: |
        Ja, ihr könnt mit dem Camper auf den Campingplatz. Ordner:innen werden euch vor Ort
        einweisen.
    - title: Kann man vor Ort duschen?
      body: |
        Ja. Wir haben Dusch- und Waschmöglichkeiten auf dem Gelände.
    - title: Gibt es vor Ort Essen und Trinken?
      body: |
        Wir haben mehrere Essens-Angebote. Es gibt eine Auswahl an Gerichten, die auch vegane und
        vegetarische Varianten abdecken. Für Kaffee ist auch gesorgt.

        Die Bar ist ab Vormittags geöffnet und hat eine große Auswahl an nicht-alkoholischen und
        alkoholischen Getränken.
    - title: Kann ich mit Karte zahlen?
      body: |
        Aktuell ist dies noch nicht möglich. Nehmt euch Bargeld mit! Sollten wir hierzu news haben, teilen
        wir es mit euch auf sozial media.
    - title: Darf ich vor Ort Feuer machen?
      body: |
        Nein. Da das Festival neben Wäldern und auf trockenen Wiesen im Hochsommer stattfindet, sind
        offene Feuer auf dem gesamten Gelände strengstens verboten.
    - title: Darf ich grillen?
      body: |
        Aufgrund der Brandgefahr ist das Grillen strengstens verboten.
    - title: Darf ich meine eigene Anlage mitbringen?
      body: |
        So lange ihr nicht übertreibt dürft ihr auf dem Campingplatz eure Musik hören. Nachts sollte es
        dann aber ruhig werden, da sich manche ausruhen oder schlafen legen möchten. Wir sorgen ja für
        Musik bis in die Nacht :)
        Der Campingplatz soll als Rückzugsort dienen! Bitte respektiert dies.
    - title: Darf ich Glasflaschen mitbringen?
      body: |
        Auf dem Campingplatz ist dies grundsätzlich nicht verboten. Passt jedoch auf Scherben auf, da
        viele gerne barfuß tanzen gehen möchten.
        Auf das Festivalgelände dürft ihr jedoch keine Flaschen oder Getränke mitnehmen.
    - title: Gibt es Müllpfand?
      body: |
        Ja! Am Einlass bekommt ihr zu eurem Zelt-Ticket einen Müllbeutel + Pfandmarke. Diese können
        am Ende wieder gegen das Pfand eingetauscht werden. Bitte sorgt dafür, dass ihr den Zeltplatz
        sauber hinterlasst.
    - title: Wann Müllpfand zurückgeben?
      body: |
        - Sonntag: 10 bis 18 Uhr

        - Montag: 10 bist 12 Uhr
